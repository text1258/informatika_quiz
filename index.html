<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест по Информатике — Часть 2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --card: #22263a;
    --border: #2e334d;
    --accent: #5b8ef0;
    --accent2: #7c5bf0;
    --green: #34c96c;
    --red: #f05b5b;
    --yellow: #f0c55b;
    --text: #e8eaf6;
    --muted: #7b80a0;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #app { width: 100%; max-width: 780px; padding: 24px 16px 60px; }

  /* HEADER */
  .header {
    text-align: center;
    padding: 36px 0 28px;
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.3px;
  }
  .header p { color: var(--muted); font-size: .875rem; margin-top: 6px; }

  /* PROGRESS */
  .progress-bar-wrap {
    background: var(--surface);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .4s ease;
  }
  .progress-text { color: var(--muted); font-size: .78rem; text-align: right; margin-bottom: 20px; }

  /* STATS ROW */
  .stats { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat {
    flex: 1; min-width: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    text-align: center;
  }
  .stat-val { font-size: 1.4rem; font-weight: 700; }
  .stat-lbl { font-size: .7rem; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .5px; }
  .stat.green .stat-val { color: var(--green); }
  .stat.red .stat-val { color: var(--red); }
  .stat.blue .stat-val { color: var(--accent); }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 28px 22px;
    margin-bottom: 16px;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:none; } }

  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: .72rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 1rem;
    line-height: 1.65;
    font-weight: 500;
    margin-bottom: 22px;
  }
  .q-text.is-definition {
    background: rgba(91,142,240,.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    padding: 14px 18px;
    font-style: italic;
    color: #c8d4f8;
    margin-bottom: 8px;
  }

  /* BADGE TYPES */
  .q-badge {
    display: inline-block;
    font-size: .68rem;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 99px;
    margin-bottom: 14px;
  }
  .badge-multi { background: rgba(91,142,240,.18); color: var(--accent); }
  .badge-single { background: rgba(124,91,240,.18); color: #a78bfa; }
  .badge-text { background: rgba(240,197,91,.18); color: var(--yellow); }
  .badge-match { background: rgba(52,201,108,.18); color: var(--green); }
  .badge-order { background: rgba(240,91,91,.18); color: var(--red); }

  /* CHOICES */
  .choices { display: flex; flex-direction: column; gap: 9px; }
  .choice-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: .9rem;
    padding: 12px 16px 12px 44px;
    text-align: left;
    cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s;
    line-height: 1.5;
    position: relative;
    touch-action: manipulation;
  }
  .choice-btn::before {
    content: '';
    position: absolute;
    left: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    transition: border-color .15s, background .15s;
    flex-shrink: 0;
  }
  .choice-btn:hover { border-color: var(--accent); background: rgba(91,142,240,.1); }
  .choice-btn:hover::before { border-color: var(--accent); }
  /* Selected (before check) */
  .choice-btn.selected { border-color: var(--accent); background: rgba(91,142,240,.15); }
  .choice-btn.selected::before { border-color: var(--accent); background: var(--accent); }
  /* ✓ You selected it AND it's correct */
  .choice-btn.correct { border-color: var(--green); background: rgba(52,201,108,.18); color: #7fefad; font-weight: 600; }
  .choice-btn.correct::before { border-color: var(--green); background: var(--green); content: '✓'; color: #0f1117; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; line-height: 1; }
  /* ✗ You selected it BUT it's wrong */
  .choice-btn.wrong { border-color: var(--red); background: rgba(240,91,91,.18); color: #f08080; }
  .choice-btn.wrong::before { border-color: var(--red); background: var(--red); content: '✗'; color: #fff; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; line-height: 1; }
  /* ○ You didn't select it but it's correct (missed answer) */
  .choice-btn.reveal-correct { border-color: var(--green); background: rgba(52,201,108,.07); color: #5edd8e; }
  .choice-btn.reveal-correct::before { border-color: var(--green); background: transparent; content: '○'; color: var(--green); font-size: 10px; display: flex; align-items: center; justify-content: center; line-height: 1; }

  /* TEXT INPUT */
  .text-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: .95rem;
    padding: 13px 16px;
    outline: none;
    transition: border-color .15s;
    resize: vertical;
    min-height: 80px;
  }
  .text-input:focus { border-color: var(--accent); }
  .text-input.correct-input { border-color: var(--green); }
  .text-input.wrong-input { border-color: var(--red); }

  /* MATCH */
  .match-grid { display: flex; flex-direction: column; gap: 18px; }
  .match-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .match-left {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: .85rem;
    line-height: 1.4;
    width: 100%;
    box-sizing: border-box;
  }
  .match-right-select {
    width: 100%;
    box-sizing: border-box;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: .85rem;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
    transition: border-color .15s;
  }
  .match-right-select:focus { border-color: var(--accent); }
  .match-right-select.correct-match { border-color: var(--green); background: rgba(52,201,108,.1); }
  .match-right-select.wrong-match { border-color: var(--red); background: rgba(240,91,91,.1); }

  /* ORDER */
  .order-list { display: flex; flex-direction: column; gap: 8px; }
  .order-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: grab;
    user-select: none;
    transition: border-color .15s, opacity .15s;
  }
  .order-item:active { cursor: grabbing; opacity: .8; }
  .order-item.dragging { opacity: .4; }
  .order-item.drag-over { border-color: var(--accent); background: rgba(91,142,240,.15); }
  .order-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: .75rem;
    color: var(--accent);
    font-weight: 700;
    min-width: 22px;
  }
  .order-handle { color: var(--muted); font-size: 1rem; }
  .order-item.correct-order { border-color: var(--green); background: rgba(52,201,108,.1); }
  .order-item.wrong-order { border-color: var(--red); background: rgba(240,91,91,.1); }

  /* FEEDBACK */
  .feedback {
    margin-top: 14px;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: .88rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(52,201,108,.12); border: 1px solid rgba(52,201,108,.3); color: #5edd8e; }
  .feedback.wrong-fb { background: rgba(240,91,91,.12); border: 1px solid rgba(240,91,91,.3); color: #f08080; }
  .feedback strong { color: inherit; }

  /* BUTTONS */
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    border: none;
    border-radius: 10px;
    font-family: 'Inter', sans-serif;
    font-size: .88rem;
    font-weight: 600;
    padding: 11px 22px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .88; transform: translateY(-1px); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; flex: 1; }
  .btn-skip { background: rgba(240,197,91,.12); border: 1.5px solid rgba(240,197,91,.4); color: var(--yellow); font-weight: 600; }
  .btn-skip:hover { background: rgba(240,197,91,.22); border-color: var(--yellow); opacity: 1; }
  .btn-next { background: linear-gradient(135deg, var(--green), #27ae60); color: #fff; flex: 1; }

  /* FINISH */
  .finish-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 28px;
    text-align: center;
    animation: slideUp .3s ease;
  }
  .finish-emoji { font-size: 3.5rem; margin-bottom: 16px; }
  .finish-card h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
  .finish-card p { color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .finish-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
  .finish-stat { text-align: center; }
  .finish-stat .val { font-size: 2rem; font-weight: 700; }
  .finish-stat .lbl { font-size: .75rem; color: var(--muted); }
  .btn-restart { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; border: none; border-radius: 10px; padding: 13px 32px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; }

  /* ROUND INDICATOR */
  .round-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(240,197,91,.12);
    border: 1px solid rgba(240,197,91,.3);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: .75rem;
    color: var(--yellow);
    font-weight: 600;
    margin-bottom: 16px;
  }

  /* BURGER BUTTON */
  .burger-btn {
    position: fixed;
    top: 14px;
    right: 16px;
    z-index: 1000;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    width: 42px;
    height: 42px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    padding: 0;
  }
  .burger-btn:hover { background: var(--surface); border-color: var(--accent); }
  .burger-btn span {
    display: block;
    width: 18px;
    height: 2px;
    background: var(--text);
    border-radius: 2px;
    transition: background .15s;
  }
  .burger-btn:hover span { background: var(--accent); }

  /* MENU DRAWER */
  .menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 1100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .menu-overlay.open { opacity: 1; pointer-events: all; }

  .menu-drawer {
    position: fixed;
    top: 0;
    right: -340px;
    width: min(320px, 90vw);
    height: 100%;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 1200;
    display: flex;
    flex-direction: column;
    transition: right .28s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  .menu-drawer.open { right: 0; }

  .menu-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .menu-header h3 {
    font-size: .95rem;
    font-weight: 700;
    color: var(--text);
  }
  .menu-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.4rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .menu-close:hover { color: var(--text); background: var(--card); }

  .menu-list {
    overflow-y: auto;
    flex: 1;
    padding: 10px 0;
  }
  .menu-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background .12s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    color: var(--text);
    font-family: 'Inter', sans-serif;
  }
  .menu-item:hover { background: var(--card); }
  .menu-item-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: .7rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 26px;
    padding-top: 2px;
  }
  .menu-item-text {
    font-size: .82rem;
    line-height: 1.45;
    color: var(--muted);
  }
  .menu-item:hover .menu-item-text { color: var(--text); }

  /* SINGLE QUESTION FULLSCREEN */
  .solo-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 900;
    overflow-y: auto;
    animation: slideUp .22s ease;
  }
  .solo-screen.active { display: block; }

  .solo-topbar {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  .solo-back {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 1rem;
    transition: border-color .15s, background .15s;
    flex-shrink: 0;
  }
  .solo-back:hover { border-color: var(--accent); background: rgba(91,142,240,.1); color: var(--accent); }

  .solo-topbar-title {
    font-size: .85rem;
    color: var(--muted);
    font-weight: 500;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .solo-content {
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }
</style>
</head>
<body>
<!-- Burger button (always visible) -->
<button class="burger-btn" onclick="openMenu()" aria-label="Меню вопросов">
  <span></span><span></span><span></span>
</button>

<!-- Menu overlay + drawer -->
<div class="menu-overlay" id="menu-overlay" onclick="closeMenu()"></div>
<div class="menu-drawer" id="menu-drawer">
  <div class="menu-header">
    <h3>Все вопросы</h3>
    <button class="menu-close" onclick="closeMenu()">✕</button>
  </div>
  <div class="menu-list" id="menu-list"></div>
</div>

<!-- Solo (full-screen single question) screen -->
<div class="solo-screen" id="solo-screen">
  <div class="solo-topbar">
    <button class="solo-back" id="solo-back-btn" onclick="closeSolo()" aria-label="Назад">&#8592;</button>
    <div class="solo-topbar-title" id="solo-topbar-title">Вопрос</div>
  </div>
  <div class="solo-content" id="solo-content"></div>
</div>

<div id="app">
  <div class="header">
    <h1>Информатика — Тест. Часть 2</h1>
    <p>76 вопросов · неправильные повторяются</p>
  </div>
  <div id="quiz-area"></div>
</div>

<script>
const ALL_QUESTIONS = [
  {
    id:1, type:'multi',
    q:'Укажите, какие из перечисленных ниже программ относятся к ПРИКЛАДНОМУ программному обеспечению:',
    options:['Текстовый редактор (MS Word)','Электронные таблицы (MS Excel)','Браузер','Графический редактор','Электронная почта (клиентская программа)','Оболочка базы данных','Антивирус','Операционная система','Архиватор','СУБД (ядро)'],
    correct:[0,1,2,3,4,5],
    explanation:'К прикладному ПО относятся: текстовые редакторы, электронные таблицы, оболочки БД, почтовые клиенты, браузеры, графические редакторы. Системное ПО (ОС, антивирусы, архиваторы, ядра СУБД) — это НЕ прикладное ПО.'
  },
  {
    id:2, type:'text',
    q:'Информация, имеющая действительную или потенциальную коммерческую ценность в силу неизвестности её третьим лицам, к которой нет свободного доступа на законном основании, и обладатель которой принимает меры к охране её конфиденциальности.',
    keywords:['коммерческая тайна'],
    answer:'Коммерческая тайна',
    hint:'Это вид охраняемой информации, имеющей коммерческую ценность.'
  },
  {
    id:3, type:'multi',
    q:'К способам защиты программного обеспечения как интеллектуальной собственности относятся:',
    options:['Авторское право (Copyright)','Патентное право','Коммерческая тайна (Trade Secrets)','Лицензирование пользователей','Шифрование кода'],
    correct:[0,1,2],
    explanation:'Три способа защиты ПО как интеллектуальной собственности: авторское право, патентное право, коммерческая тайна.'
  },
  {
    id:4, type:'multi',
    q:'Авторское право на программу охраняет:',
    options:['Форму (текст) программы','Аудиовизуальное отображение, порождаемое программой','Идеи и принципы, заложенные в программе','Алгоритмы','Принципы организации интерфейса'],
    correct:[0,1],
    explanation:'Авторское право охраняет форму (текст) программы, аудиовизуальное отображение. Идеи, принципы, алгоритмы и принципы организации интерфейса авторским правом НЕ защищаются.'
  },
  {
    id:5, type:'multi',
    q:'К личным НЕИМУЩЕСТВЕННЫМ авторским правам на программное обеспечение относятся:',
    options:['Право считаться автором программы','Право определять форму указания имени автора (явно, псевдоним, анонимно)','Право на защиту программы от искажений, способных нанести ущерб чести автора','Право на вознаграждение','Право запрещать распространение программы'],
    correct:[0,1,2],
    explanation:'Личные неимущественные права: право авторства, право на имя, право на защиту репутации. Имущественные права (продажа, вознаграждение) — отдельная категория.'
  },
  {
    id:6, type:'multi',

// Quizlet-style state
let queue = [];
let currentQ = null;
let answered = false;
let totalQ = ALL_QUESTIONS.length;
let correctCount = 0;
let wrongCount = 0;
let roundNum = 1;
let sessionWrong = new Set();

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  queue = shuffle([...ALL_QUESTIONS]);
  sessionWrong.clear();
  correctCount = 0;
  wrongCount = 0;
  roundNum = 1;
  nextQuestion();
}

function nextQuestion() {
  if (queue.length === 0) {
    if (sessionWrong.size === 0) {
      showFinish();
      return;
    }
    // New round with wrong answers
    roundNum++;
    queue = shuffle([...ALL_QUESTIONS].filter(q => sessionWrong.has(q.id)));
    sessionWrong.clear();
  }
  currentQ = queue.shift();
  answered = false;
  renderQuestion();
}

function renderQuestion() {
  const area = document.getElementById('quiz-area');
  const done = totalQ - queue.length - (sessionWrong.size) + (roundNum > 1 ? 0 : 0);
  const prog = Math.round(((totalQ - queue.length) / totalQ) * 100);

  let html = `
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${Math.min(prog,100)}%"></div></div>
    <div class="progress-text">${totalQ - queue.length} / ${totalQ} вопросов пройдено</div>
    <div class="stats">
      <div class="stat green"><div class="stat-val">${correctCount}</div><div class="stat-lbl">Верно</div></div>
      <div class="stat red"><div class="stat-val">${wrongCount}</div><div class="stat-lbl">Неверно</div></div>
      <div class="stat blue"><div class="stat-val">${queue.length}</div><div class="stat-lbl">Осталось</div></div>
    </div>
  `;

  if (roundNum > 1) {
    html += `<div class="round-badge">🔁 Раунд ${roundNum} — повторение ошибок</div>`;
  }

  const q = currentQ;
  const typeLabel = {
    multi:'☑ Несколько правильных ответов',
    single:'○ Один правильный ответ',
    text:'✎ Напишите термин по определению',
    match:'⇄ Установите соответствие',
    order:'↕ Расставьте по порядку'
  };
  const badgeClass = {multi:'badge-multi',single:'badge-single',text:'badge-text',match:'badge-match',order:'badge-order'};

  html += `<div class="card" id="q-card">
    <div class="q-num">Вопрос №${q.id}</div>
    <span class="q-badge ${badgeClass[q.type]}">${typeLabel[q.type]}</span>
    <div class="q-text${q.type === 'text' ? ' is-definition' : ''}">${q.type === 'text' ? '<span style="display:block;color:var(--muted);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-style:normal;">Определение:</span>' : ''}${q.q}</div>
    ${q.type === 'text' ? '<div style="color:var(--muted);font-size:.85rem;margin:-4px 0 16px;">← Введите термин, которому соответствует это определение</div>' : ''}
    <div id="q-body">`;

  if (q.type === 'single') {
    const shuffled = shuffle(q.options.map((o,i) => ({text:o,idx:i})));
    html += `<div class="choices" id="choices">`;
    shuffled.forEach(o => {
      html += `<button class="choice-btn" data-idx="${o.idx}" onclick="selectSingle(this)">${o.text}</button>`;
    });
    html += `</div>`;
  } else if (q.type === 'multi') {
    const shuffled = shuffle(q.options.map((o,i) => ({text:o,idx:i})));
    html += `<div class="choices" id="choices">`;
    shuffled.forEach(o => {
      html += `<button class="choice-btn" data-idx="${o.idx}" onclick="toggleMulti(this)">${o.text}</button>`;
    });
    html += `</div>`;
  } else if (q.type === 'text') {
    html += `<textarea class="text-input" id="text-ans" placeholder="Введите термин..." rows="2" style="min-height:54px;resize:none;"></textarea>`;
  } else if (q.type === 'match') {
    // Shuffle both left pairs order and right options independently
    const shuffledPairs = shuffle(q.pairs.map((p,i) => ({...p, origI:i})));
    const rights = shuffle(q.pairs.map(p => p.right));
    html += `<div class="match-grid" id="match-grid">`;
    shuffledPairs.forEach((p, i) => {
      html += `<div class="match-row">
        <div class="match-left">${p.left}</div>
        <select class="match-right-select" data-correct="${p.right}" id="ms${i}">
          <option value="">— выберите —</option>
          ${rights.map(r => `<option value="${r}">${r}</option>`).join('')}
        </select>
      </div>`;
    });
    html += `</div>`;
  } else if (q.type === 'order') {
    // Shuffle items
    const shuffled = shuffle(q.items.map((t,i) => ({text:t, orig:i})));
    html += `<div class="order-list" id="order-list">`;
    shuffled.forEach((item, i) => {
      html += `<div class="order-item" draggable="true" data-orig="${item.orig}" ondragstart="dragStart(event)" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropItem(event)">
        <span class="order-handle">⠿</span>
        <span class="order-num">${i+1}</span>
        <span>${item.text}</span>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="feedback" id="feedback"></div>
    <div class="btn-row">
      <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">Проверить</button>
      <button class="btn btn-skip" onclick="skipQuestion()">Пропустить</button>
    </div>
  </div></div></div>`;

  area.innerHTML = html;
}

// Drag & drop for order
let dragSrc = null;
function dragStart(e) {
  dragSrc = e.currentTarget;
  dragSrc.classList.add('dragging');
}
function dragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function dragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}
function dropItem(e) {
  e.preventDefault();
  const target = e.currentTarget;
  target.classList.remove('drag-over');
  if (dragSrc && dragSrc !== target) {
    const list = document.getElementById('order-list');
    const items = [...list.children];
    const si = items.indexOf(dragSrc);
    const ti = items.indexOf(target);
    if (si < ti) list.insertBefore(dragSrc, target.nextSibling);
    else list.insertBefore(dragSrc, target);
    // Update numbers
    [...list.children].forEach((el,i) => el.querySelector('.order-num').textContent = i+1);
  }
  dragSrc && dragSrc.classList.remove('dragging');
  dragSrc = null;
}

function selectSingle(btn) {
  if (answered) return;
  document.querySelectorAll('#choices .choice-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function toggleMulti(btn) {
  if (answered) return;
  // Prevent double-fire from touch+click on mobile
  if (btn._toggling) return;
  btn._toggling = true;
  btn.classList.toggle('selected');
  setTimeout(() => { btn._toggling = false; }, 300);
}

function checkAnswer() {
  if (answered) {
    nextQuestion();
    return;
  }
  answered = true;
  const q = currentQ;
  let isCorrect = false;

  const fb = document.getElementById('feedback');

  if (q.type === 'single') {
    const selected = document.querySelector('#choices .choice-btn.selected');
    if (!selected) { answered = false; fb.textContent = 'Выберите вариант ответа.'; fb.className = 'feedback wrong-fb show'; return; }
    const idx = parseInt(selected.dataset.idx);
    isCorrect = idx === q.correct;
    document.querySelectorAll('#choices .choice-btn').forEach(b => {
      if (parseInt(b.dataset.idx) === q.correct) b.classList.add('reveal-correct');
      if (b.classList.contains('selected') && !isCorrect) b.classList.add('wrong');
      if (b.classList.contains('selected') && isCorrect) b.classList.add('correct');
    });

  } else if (q.type === 'multi') {
    const selected = [...document.querySelectorAll('#choices .choice-btn.selected')].map(b => parseInt(b.dataset.idx)).sort((a,b)=>a-b);
    const correct = [...q.correct].sort((a,b)=>a-b);
    isCorrect = JSON.stringify(selected) === JSON.stringify(correct);
    document.querySelectorAll('#choices .choice-btn').forEach(b => {
      const idx = parseInt(b.dataset.idx);
      const isSelected = b.classList.contains('selected');
      const isCorrectOption = q.correct.includes(idx);
      b.classList.remove('selected');
      if (isSelected && isCorrectOption) b.classList.add('correct');
      else if (isSelected && !isCorrectOption) b.classList.add('wrong');
      else if (!isSelected && isCorrectOption) b.classList.add('reveal-correct');
    });

  } else if (q.type === 'text') {
    const val = document.getElementById('text-ans').value.toLowerCase().trim();
    isCorrect = q.keywords.some(kw => val.includes(kw.toLowerCase()));
    const ta = document.getElementById('text-ans');
    ta.classList.add(isCorrect ? 'correct-input' : 'wrong-input');

  } else if (q.type === 'match') {
    let allOk = true;
    document.querySelectorAll('.match-right-select').forEach(sel => {
      const ok = sel.value === sel.dataset.correct;
      if (!ok) allOk = false;
      sel.classList.add(ok ? 'correct-match' : 'wrong-match');
    });
    isCorrect = allOk;

  } else if (q.type === 'order') {
    const list = document.getElementById('order-list');
    const items = [...list.children];
    const userOrder = items.map(el => parseInt(el.dataset.orig));
    isCorrect = JSON.stringify(userOrder) === JSON.stringify(q.correct);
    items.forEach((el, i) => {
      el.classList.add(userOrder[i] === q.correct[i] ? 'correct-order' : 'wrong-order');
    });
  }

  if (isCorrect) {
    correctCount++;
    let extra = q.type === 'text' ? ` Термин: <strong style="color:#f0e08a">${q.answer}</strong>.` : '';
    fb.innerHTML = `✓ Верно!${extra} ${q.explanation || ''}`;
    fb.className = 'feedback correct-fb show';
  } else {
    wrongCount++;
    sessionWrong.add(q.id);
    let ansText = '';
    if (q.type === 'text') ansText = `<br><strong>Правильный ответ:</strong> <span style="font-size:1.05em;font-weight:700;color:#f0e08a">${q.answer}</span>${q.hint ? `<br><em style="opacity:.8">${q.hint}</em>` : ''}`;
    fb.innerHTML = `✗ Неверно. ${q.explanation || ''} ${ansText}`;
    fb.className = 'feedback wrong-fb show';
  }

  const btn = document.getElementById('check-btn');
  btn.textContent = 'Следующий вопрос →';
  btn.className = 'btn btn-next';
}

function skipQuestion() {
  sessionWrong.add(currentQ.id);
  wrongCount++;
  nextQuestion();
}

function showFinish() {
  const pct = Math.round(correctCount / totalQ * 100);
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '😊' : '📚';
  document.getElementById('quiz-area').innerHTML = `
    <div class="finish-card">
      <div class="finish-emoji">${emoji}</div>
      <h2>Тест завершён!</h2>
      <p>Вы ответили на все ${totalQ} вопросов.<br>Потребовалось ${roundNum} ${roundNum === 1 ? 'раунд' : roundNum < 5 ? 'раунда' : 'раундов'}.</p>
      <div class="finish-stats">
        <div class="finish-stat"><div class="val" style="color:var(--green)">${correctCount}</div><div class="lbl">верно</div></div>
        <div class="finish-stat"><div class="val" style="color:var(--accent)">${pct}%</div><div class="lbl">результат</div></div>
        <div class="finish-stat"><div class="val" style="color:var(--red)">${wrongCount}</div><div class="lbl">ошибок</div></div>
      </div>
      <button class="btn-restart" onclick="startQuiz()">Пройти снова</button>
    </div>
  `;
}

// ─── BURGER MENU ───────────────────────────────────────────────────────────

function buildMenuList() {
  const list = document.getElementById('menu-list');
  list.innerHTML = ALL_QUESTIONS.map(q => {
    const typeIcon = {multi:'☑',single:'○',text:'✎',match:'⇄',order:'↕'}[q.type] || '';
    const preview = q.q.length > 72 ? q.q.slice(0, 72) + '…' : q.q;
    return `<button class="menu-item" onclick="openSolo(${q.id})">
      <span class="menu-item-num">${typeIcon} ${q.id}</span>
      <span class="menu-item-text">${preview}</span>
    </button>`;
  }).join('');
}

function openMenu() {
  buildMenuList();
  document.getElementById('menu-overlay').classList.add('open');
  document.getElementById('menu-drawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeMenu() {
  document.getElementById('menu-overlay').classList.remove('open');
  document.getElementById('menu-drawer').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── SOLO SCREEN ───────────────────────────────────────────────────────────

let soloAnswered = false;
let soloQ = null;

function openSolo(qId) {
  closeMenu();
  soloQ = ALL_QUESTIONS.find(q => q.id === qId);
  if (!soloQ) return;
  soloAnswered = false;

  document.getElementById('solo-topbar-title').textContent = `Вопрос №${soloQ.id}`;
  document.getElementById('solo-content').innerHTML = buildQuestionHTML(soloQ, 'solo');
  document.getElementById('solo-screen').classList.add('active');
  document.body.style.overflow = 'hidden';

  // Push history state so the Android back button works
  history.pushState({ soloOpen: true, qId }, '', '');
}

function closeSolo() {
  document.getElementById('solo-screen').classList.remove('active');
  document.body.style.overflow = '';
  // Remove the pushed state if we're closing programmatically
  if (history.state && history.state.soloOpen) history.back();
}

// Handle browser/Android back button
window.addEventListener('popstate', function(e) {
  const solo = document.getElementById('solo-screen');
  if (solo.classList.contains('active')) {
    solo.classList.remove('active');
    document.body.style.overflow = '';
  }
});

      <button class="btn btn-primary" id="${pfx}-check-btn" onclick="soloCheckAnswer('${pfx}')">Проверить</button>
    </div>
  </div></div>`;

  return html;
}

function dropItemPfx(e, pfx) {
  e.preventDefault();
  const target = e.currentTarget;
  target.classList.remove('drag-over');
  if (dragSrc && dragSrc !== target) {
    const list = target.parentElement;
    const items = [...list.children];
    const si = items.indexOf(dragSrc);
    const ti = items.indexOf(target);
    if (si < ti) list.insertBefore(dragSrc, target.nextSibling);
    else list.insertBefore(dragSrc, target);
    [...list.children].forEach((el,i) => el.querySelector('.order-num').textContent = i+1);
  }
  dragSrc && dragSrc.classList.remove('dragging');
  dragSrc = null;
}

function soloSelectSingle(btn, pfx) {
  if (soloAnswered) return;
  document.querySelectorAll(`#${pfx}-choices .choice-btn`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function soloToggleMulti(btn, pfx) {
  if (soloAnswered) return;
  if (btn._toggling) return;
  btn._toggling = true;
  btn.classList.toggle('selected');
  setTimeout(() => { btn._toggling = false; }, 300);
}

function soloCheckAnswer(pfx) {
  if (soloAnswered) return;
  soloAnswered = true;
  const q = soloQ;
  let isCorrect = false;
  const fb = document.getElementById(`${pfx}-feedback`);

  if (q.type === 'single') {
    const selected = document.querySelector(`#${pfx}-choices .choice-btn.selected`);
    if (!selected) { soloAnswered = false; fb.textContent = 'Выберите вариант ответа.'; fb.className = 'feedback wrong-fb show'; return; }
    const idx = parseInt(selected.dataset.idx);
    isCorrect = idx === q.correct;
    document.querySelectorAll(`#${pfx}-choices .choice-btn`).forEach(b => {
      if (parseInt(b.dataset.idx) === q.correct) b.classList.add('reveal-correct');
      if (b.classList.contains('selected') && !isCorrect) b.classList.add('wrong');
      if (b.classList.contains('selected') && isCorrect) b.classList.add('correct');
    });
  } else if (q.type === 'multi') {
    const selected = [...document.querySelectorAll(`#${pfx}-choices .choice-btn.selected`)].map(b => parseInt(b.dataset.idx)).sort((a,b)=>a-b);
    const correct = [...q.correct].sort((a,b)=>a-b);
    isCorrect = JSON.stringify(selected) === JSON.stringify(correct);
    document.querySelectorAll(`#${pfx}-choices .choice-btn`).forEach(b => {
      const idx = parseInt(b.dataset.idx);
      const isSel = b.classList.contains('selected');
      const isCorr = q.correct.includes(idx);
      b.classList.remove('selected');
      if (isSel && isCorr) b.classList.add('correct');
      else if (isSel && !isCorr) b.classList.add('wrong');
      else if (!isSel && isCorr) b.classList.add('reveal-correct');
    });
  } else if (q.type === 'text') {
    const val = document.getElementById(`${pfx}-text-ans`).value.toLowerCase().trim();
    isCorrect = q.keywords.some(kw => val.includes(kw.toLowerCase()));
    document.getElementById(`${pfx}-text-ans`).classList.add(isCorrect ? 'correct-input' : 'wrong-input');
  } else if (q.type === 'match') {
    let allOk = true;
    document.querySelectorAll(`#${pfx}-match-grid .match-right-select`).forEach(sel => {
      const ok = sel.value === sel.dataset.correct;
      if (!ok) allOk = false;
      sel.classList.add(ok ? 'correct-match' : 'wrong-match');
    });
    isCorrect = allOk;
  } else if (q.type === 'order') {
    const list = document.getElementById(`${pfx}-order-list`);
    const items = [...list.children];
    const userOrder = items.map(el => parseInt(el.dataset.orig));
    isCorrect = JSON.stringify(userOrder) === JSON.stringify(q.correct);
    items.forEach((el, i) => {
      el.classList.add(userOrder[i] === q.correct[i] ? 'correct-order' : 'wrong-order');
    });
  }

  const btn = document.getElementById(`${pfx}-check-btn`);
  if (isCorrect) {
    let extra = q.type === 'text' ? ` Термин: <strong style="color:#f0e08a">${q.answer}</strong>.` : '';
    fb.innerHTML = `✓ Верно!${extra} ${q.explanation || ''}`;
    fb.className = 'feedback correct-fb show';
    btn.textContent = 'Ещё раз'; btn.className = 'btn btn-next';
    btn.onclick = () => { soloAnswered = false; openSolo(q.id); };
  } else {
    let ansText = '';
    if (q.type === 'text') ansText = `<br><strong>Правильный ответ:</strong> <span style="font-size:1.05em;font-weight:700;color:#f0e08a">${q.answer}</span>${q.hint ? `<br><em style="opacity:.8">${q.hint}</em>` : ''}`;
    fb.innerHTML = `✗ Неверно. ${q.explanation || ''} ${ansText}`;
    fb.className = 'feedback wrong-fb show';
    btn.textContent = 'Ещё раз'; btn.className = 'btn btn-skip';
    btn.onclick = () => { soloAnswered = false; openSolo(q.id); };
  }
}

startQuiz();
</script>
